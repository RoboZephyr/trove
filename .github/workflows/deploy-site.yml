name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # wrangler-action@v3 auto-detects the package manager from lockfile presence.
      # Trove ships `bun.lock`, so the action tries to invoke `bun` which is not
      # preinstalled on ubuntu-latest. Install it explicitly first.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=trove --branch=main --commit-dirty=true
